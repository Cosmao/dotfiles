# ----------------------------------------------------- 
# Autostart
# ----------------------------------------------------- 

# Start waybar
exec-once = waybar

# Start hyprpaper
exec-once = hyprpaper

# Load Dunst Notification Manager
exec-once = dunst

# Using hypridle to start hyprlock
exec-once = systemctl --user start hypridle

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Load onedrive
# Moved to systemd
# exec-once = uwsm app -- rclone --vfs-cache-mode writes mount oneDrive: onedrive

# wlsunset
exec-once = wlsunset -l -59.3 -L -18.0

# kitty
exec-once = [workspace 1 silent] kitty -1

# Firefox
exec-once = [workspace 2 silent] firefox

# Discord
exec-once = [workspace 3 silent] discord

# Slack
exec-once = [workspace 7 silent] slack

# KeepassXC
exec-once = [workspace 9 silent] keepassxc

# Thunderbird
exec-once = [workspace 10 silent] thunderbird
