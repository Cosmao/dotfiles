# Slack
windowrule {
    name = slack-workspace
    workspace = 7 silent
    match:class = slack
}

# Discord
windowrule {
    name = discord-workspace
    workspace = 3 silent
    match:class = discord
}

# Firefox smol video
windowrule {
    name = firefox-pip
    match:title = Picture-in-Picture
    size = 900 506
    move = 1960 61
    float = on
    pin = on
    opacity = 1.0 override 1.0 override
}
